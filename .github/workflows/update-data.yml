name: Update arrivals data

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay scheduled runs a few minutes under load.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab
  push:
    branches: [ main ]
    paths:
      - "scrape.py"
      - ".github/workflows/update-data.yml"

# Allow the workflow to commit the refreshed data.json back to the repo.
permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape arrivals -> data.json
        run: python scrape.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json)" ]; then
            git add data.json
            git commit -m "data: refresh arrivals"
            git push
          else
            echo "No change in data.json"
          fi
